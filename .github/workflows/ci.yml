name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test -race + coverage
        run: go test -race -coverprofile=coverage.out ./...

      # The browser transport (engine/wasm) is js,wasm-only, so `go test ./...`
      # above never compiles or runs it. Without this lane a bug in the wasm
      # write path — like the grip-drag array coercion that shipped silently
      # broken (#91) — passes CI green. Run the js,wasm tests under Node using
      # the toolchain's exec shim.
      - name: go test (js,wasm) under Node
        run: |
          GOROOT=$(go env GOROOT)
          PATH="$GOROOT/lib/wasm:$GOROOT/misc/wasm:$PATH" \
            GOOS=js GOARCH=wasm go test ./engine/wasm/...

      - name: coverage floor (library packages, examples excluded)
        run: |
          go test -coverprofile=cover.lib.out $(go list ./... | grep -v '/examples/') >/dev/null
          total=$(go tool cover -func=cover.lib.out | awk '/^total:/ {print substr($3, 1, length($3)-1)}')
          echo "library coverage: ${total}%"
          awk -v t="$total" 'BEGIN { if (t+0 < 75.0) { print "FAIL: library coverage " t "% is below the 75% floor"; exit 1 } }'

      # golangci-lint runs in its own workflow (.github/workflows/lint.yml) so it
      # has a dedicated live badge — the honest replacement for the retired Go
      # Report Card.
