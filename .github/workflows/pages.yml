name: pages

# Build the landing-page demos (notebook → wasm) and deploy site/ to GitHub
# Pages. The demos are generated, not committed (site/demos is gitignored), so
# Pages builds them fresh from the notebook sources on every push to main.
on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "examples/capacity/**"
      - "examples/curvefit/**"
      - "examples/bayes/**"
      - "examples/anscombe/**"
      - "examples/nbody/**"
      - "examples/turing/**"
      - "examples/surface/**"
      - "examples/gpulife/**"
      - "examples/percolation/**"
      - "examples/lotka/**"
      - "examples/clt/**"
      - "engine/**"
      - "internal/**"
      - "cmd/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: build wasm demos
        run: ./site/build.sh
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
