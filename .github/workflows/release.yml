name: Release

# On a version tag (v*), GoReleaser cross-compiles the `notebook` toolchain for
# linux/darwin/windows × amd64/arm64, builds archives + checksums, and publishes
# a GitHub release with the assets attached. The curated notes are written on the
# GitHub release; GoReleaser fills the commit-log changelog beneath them.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the changelog can diff against the last tag

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
